<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponce Demand Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 25px;
      color: #1f2937;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #374151;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[readonly] {
      background: #f9fafb;
    }

    input[type="checkbox"] {
      margin-right: 8px;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    .output {
      margin-top: 30px;
    }

    .output textarea {
      min-height: 320px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ponce Demand Portal</h1>

    <form method="POST">
      <div class="form-group">
        <label for="recipient_name">Recipient Name</label>
        <input type="text" id="recipient_name" name="recipient_name" placeholder="Bob Adjuster">
      </div>

      <div class="form-group">
        <label for="client_name">Client Name</label>
        <input type="text" id="client_name" name="client_name" placeholder="Billy Client">
      </div>

      <div class="form-group">
        <label for="loss_date">Loss Date</label>
        <input type="text" id="loss_date" name="loss_date" placeholder="01/02/2024">
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="policy_limit_demand" name="policy_limit_demand">
          Policy Limit Demand
        </label>
      </div>

      <div class="form-group" id="settlement_amount_group">
        <label for="settlement_amount">Settlement Amount</label>
        <input type="text" id="settlement_amount" name="settlement_amount" placeholder="$25,000.00">
      </div>

      <div class="form-group">
        <label for="demand_preview">Demand Preview</label>
        <input type="text" id="demand_preview" readonly value="{{ demand_type or 'Settlement Demand' }}">
      </div>

      <button type="submit">Generate Letter</button>
    </form>

    {% if generated_letter %}
    <div class="output">
      <h2>Generated Letter</h2>
      <textarea readonly>{{ generated_letter }}</textarea>
    </div>
    {% endif %}
  </div>

  <script>
    function updateDemandUI() {
      const policyLimitCheckbox = document.getElementById('policy_limit_demand');
      const settlementGroup = document.getElementById('settlement_amount_group');
      const settlementInput = document.getElementById('settlement_amount');
      const demandPreview = document.getElementById('demand_preview');

      if (!policyLimitCheckbox || !settlementGroup || !settlementInput || !demandPreview) return;

      if (policyLimitCheckbox.checked) {
        settlementGroup.style.display = 'none';
        settlementInput.value = '';
        demandPreview.value = 'Policy Limits Demand';
      } else {
        settlementGroup.style.display = 'block';
        demandPreview.value = 'Settlement Demand';
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      const policyLimitCheckbox = document.getElementById('policy_limit_demand');
      if (policyLimitCheckbox) {
        policyLimitCheckbox.addEventListener('change', updateDemandUI);
      }
      updateDemandUI();
    });
  </script>
</body>
</html>
